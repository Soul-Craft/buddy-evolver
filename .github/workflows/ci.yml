name: CI

on:
  push:
    branches: [main]
    paths:
      - 'scripts/BuddyPatcher/**'
      - 'scripts/test-security.sh'
      - 'hooks/*.sh'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/BuddyPatcher/**'
      - 'scripts/test-security.sh'
      - 'hooks/*.sh'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: scripts/BuddyPatcher/.build
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/BuddyPatcher/Package.swift', 'scripts/BuddyPatcher/Sources/**/*.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Build (release)
        run: swift build -c release --package-path scripts/BuddyPatcher

      - name: Unit tests
        run: swift test --package-path scripts/BuddyPatcher

      - name: Security tests
        run: bash scripts/test-security.sh
